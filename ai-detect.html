<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Detector - GuardianLens</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #020617; color: #f8fafc; font-family: monospace; }
        .video-wrapper { position: relative; width: 100%; max-width: 640px; margin: auto; }
        canvas { position: absolute; top: 0; left: 0; z-index: 10; width: 100%; height: 100%; }
        video { width: 100%; border-radius: 12px; background: #0f172a; border: 1px solid #1e293b; }
        .loader-ui { 
            position: absolute; inset: 0; background: #020617; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 20;
        }
    </style>
</head>
<body class="p-6">

    <div class="max-w-md mx-auto">
        <a href="index.html" class="text-cyan-500 mb-6 inline-block hover:text-cyan-400">← ABORT NEURAL LINK</a>
        
        <div class="mb-6">
            <h1 class="text-3xl font-black text-cyan-600 tracking-tighter uppercase">AI Scanner BETA</h1>
            <div class="h-1 w-20 bg-cyan-600 mt-2"></div>
        </div>

        <div class="bg-cyan-950/20 border border-cyan-800/40 p-4 rounded-xl mb-6">
            <div class="flex items-start gap-3">
                <i class="fas fa-flask text-cyan-500 mt-1"></i>
                <div>
                    <h4 class="text-xs font-bold text-cyan-400 uppercase tracking-widest">Experimental Engine</h4>
                    <p class="text-[10px] text-slate-400 mt-1 leading-relaxed">
                        NOTICE: This module is under construction. Detections may be <b>unaccurate or laggy</b> depending on your processor power. <b>Improving...</b>
                    </p>
                </div>
            </div>
        </div>

        <div class="video-wrapper">
            <div id="loader" class="loader-ui rounded-xl">
                <div class="w-12 h-12 border-4 border-cyan-900 border-t-cyan-500 rounded-full animate-spin mb-4"></div>
                <p class="text-[10px] uppercase tracking-[0.3em] text-cyan-700">Initializing Neural Weights</p>
            </div>
            <video id="webcam" autoplay playsinline muted></video>
            <canvas id="canvas"></canvas>
        </div>

        <div id="status" class="mt-4 p-3 bg-slate-900/50 rounded border border-slate-800 text-[10px] text-cyan-600 uppercase font-bold tracking-widest">
            System: Offline
        </div>
    </div>

   <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('canvas');
        const status = document.getElementById('status');
        const loader = document.getElementById('loader');
        const ctx = canvas.getContext('2d');
        let model = undefined;

        async function init() {
            status.innerText = "System: Loading COCO-SSD Network...";
            model = await cocoSsd.load({ base: 'mobilenet_v2' });
            status.innerText = "System: Network Loaded. Requesting Optics...";
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment" },
                    audio: false
                });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    loader.style.display = "none";
                    status.innerText = "System: Active Scanning Mode Enabled";
                    predict();
                };
            } catch (err) {
                status.innerText = "CRITICAL: " + err.message;
            }
        }

        async function predict() {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const predictions = await model.detect(video);
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            predictions.forEach(p => {
                // Focus on potential lens/tech hardware
                const monitorClasses = ["cell phone", "laptop", "tv", "remote", "clock"]; 
                
                if (monitorClasses.includes(p.class) && p.score > 0.35) {
                    const [x, y, w, h] = p.bbox;
                    ctx.strokeStyle = "#06b6d4";
                    ctx.lineWidth = 3;
                    ctx.strokeRect(x, y, w, h);
                    
                    ctx.fillStyle = "#06b6d4";
                    ctx.font = "bold 12px monospace";
                    ctx.fillText(`[MATCH: ${Math.round(p.score * 100)}%]`, x, y - 5);
                }
            });
            requestAnimationFrame(predict);
        }
        init();
    </script>
</body>
</html>
